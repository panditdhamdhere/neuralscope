apiVersion: batch/v1
kind: Job
metadata:
  name: neuralscope-migrate
  namespace: neuralscope
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: ghcr.io/panditdhamdhere/neuralscope/server:main
          imagePullPolicy: Always
          args: ["--migrate-only"]
          envFrom:
            - configMapRef:
                name: neuralscope-config
            - secretRef:
                name: neuralscope-secrets
          env:
            - name: RUN_MIGRATIONS
              value: "true"
