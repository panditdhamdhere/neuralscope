name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  rust:
    name: Rust CI
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neuralscope
          POSTGRES_PASSWORD: neuralscope
          POSTGRES_DB: neuralscope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/server

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --all-features
        env:
          DATABASE_URL: postgres://neuralscope:neuralscope@localhost:5432/neuralscope_test
          REDIS_URL: redis://localhost:6379
          QDRANT_URL: http://localhost:6333

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint --workspace=@neuralscope/web

      - name: Build
        run: npm run build --workspace=@neuralscope/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [rust, frontend]

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: false
          tags: neuralscope/server:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: false
          tags: neuralscope/web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    needs: [rust, frontend]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: neuralscope
          POSTGRES_PASSWORD: neuralscope
          POSTGRES_DB: neuralscope_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333

    env:
      DATABASE_URL: postgres://neuralscope:neuralscope@localhost:5432/neuralscope_test
      REDIS_URL: redis://localhost:6379
      QDRANT_URL: http://localhost:6333
      BETTER_AUTH_SECRET: ci-e2e-secret-thirty-two-characters-min
      BETTER_AUTH_URL: http://localhost:3000
      PLAYWRIGHT_BASE_URL: http://localhost:3000
      PLAYWRIGHT_API_URL: http://localhost:8080

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/server

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run database migrations
        working-directory: apps/server
        run: cargo run --release -- --migrate-only

      - name: Build web app
        run: npm run build --workspace=@neuralscope/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080
          NEXT_PUBLIC_WS_URL: ws://localhost:8080/ws
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Start API server
        working-directory: apps/server
        run: |
          cargo run --release &
          for i in {1..30}; do
            curl -sf http://localhost:8080/health && exit 0
            sleep 2
          done
          echo "Server failed to start"
          exit 1

      - name: Start web app
        run: |
          npm run start --workspace=@neuralscope/web &
          for i in {1..30}; do
            curl -sf http://localhost:3000/api/health && exit 0
            sleep 2
          done
          echo "Web failed to start"
          exit 1

      - name: Run Playwright smoke tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
