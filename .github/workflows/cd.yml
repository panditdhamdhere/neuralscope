name: CD

on:
  push:
    branches: [main]
    tags: ["v*"]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: tags
        run: |
          echo "server=${{ env.REGISTRY }}/${{ github.repository }}/server:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "web=${{ env.REGISTRY }}/${{ github.repository }}/web:${{ github.sha }}" >> "$GITHUB_OUTPUT"
          echo "server_latest=${{ env.REGISTRY }}/${{ github.repository }}/server:main" >> "$GITHUB_OUTPUT"
          echo "web_latest=${{ env.REGISTRY }}/${{ github.repository }}/web:main" >> "$GITHUB_OUTPUT"

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.server
          push: true
          tags: |
            ${{ steps.tags.outputs.server }}
            ${{ steps.tags.outputs.server_latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: true
          tags: |
            ${{ steps.tags.outputs.web }}
            ${{ steps.tags.outputs.web_latest }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:8080' }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'ws://localhost:8080/ws' }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL || 'http://localhost:3000' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
