version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nextjs:
        patterns:
          - next
          - eslint-config-next
          - "@next/*"

  - package-ecosystem: cargo
    directory: /apps/server
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /infra/docker
    schedule:
      interval: weekly
